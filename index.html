<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Car Planet</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>
<div id="game-wrapper">
    <div id="title-screen" onclick="startGameFromTitle()"><div class="title-text">CAR PLANET</div><div class="blinking-text">TAP OR PRESS A TO START</div></div>
    <div id="intro-screen">
        <div id="choice-box"><button class="retro-btn" onclick="selectGender('Boy')">BOY</button><button class="retro-btn" onclick="selectGender('Girl')">GIRL</button></div>
        <div id="name-box"><input type="text" id="player-name-input" class="retro-input" maxlength="10" placeholder="NAME?"><button class="retro-btn" style="text-align: center;" onclick="confirmName()">CONFIRM</button></div>
        <div id="rival-name-box"><input type="text" id="rival-name-input" class="retro-input" maxlength="10" placeholder="RIVAL'S NAME?"><button class="retro-btn" style="text-align: center;" onclick="confirmRivalName()">CONFIRM</button></div>
    </div>
    <canvas id="gameCanvas" width="320" height="240"></canvas>
    <div id="dialogue-container">
        <div id="portrait-box"><canvas id="portrait-canvas" width="64" height="64"></canvas></div>
        <div id="dialogue-box" onclick="advanceDialogue()">
            <div id="dialogue-name">RICK SELLERS</div><div id="dialogue-text">...</div><div class="blinking-arrow" id="diag-arrow">▼</div>
            <div id="choice-buttons"><button class="choice-btn" onclick="makeChoice('YES', event)">YES</button><button class="choice-btn" onclick="makeChoice('NO', event)">NO</button></div>
        </div>
    </div>
    <div id="start-menu">
        <div id="menu-header"></div>
        <div class="menu-item" onclick="toggleStartMenu()"><span>RESUME</span><span class="menu-arrow">▶</span></div>
        <div class="menu-item" onclick="alert('STATUS screen coming next.')"><span>STATUS</span><span class="menu-arrow">▶</span></div>
        <div class="menu-item" onclick="alert('ROSTER screen coming next.')"><span>ROSTER</span><span class="menu-arrow">▶</span></div>
        <div class="menu-item" onclick="alert('TOOLS screen coming next.')"><span>TOOLS</span><span class="menu-arrow">▶</span></div>
        <div class="menu-item" onclick="saveGame()"><span>SAVE GAME</span><span class="menu-arrow">▶</span></div>
        <div class="menu-item" onclick="alert('OPTIONS screen coming next.')"><span>OPTIONS</span><span class="menu-arrow">▶</span></div>
        <div class="menu-item" onclick="alert('v1.0.21 - Split Architecture')"><span>INFO</span><span class="menu-arrow">▶</span></div>
        <div id="menu-footer">CAR PLANET MENU</div>
    </div>
    <div id="controls">
        <div class="dpad"><div class="touch-btn" id="btn-up">↑</div><div class="touch-btn" id="btn-left">←</div><div class="touch-btn" id="btn-right">→</div><div class="touch-btn" id="btn-down">↓</div></div>
        <div class="touch-btn" id="btn-start">START</div><div class="action"><div class="touch-btn" id="btn-b">B</div><div class="touch-btn" id="btn-a">A</div></div>
    </div>
</div>

<script src="game.js"></script>
</body>
</html>
